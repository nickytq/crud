<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="2,0.js"></script>
    <style>
        body {
            background: linear-gradient(to right, #dbeafe, #eff6ff);
            font-family: Arial, sans-serif;
        }
        .card {
            border-radius: 15px;
            overflow: hidden;
        }
        .card-header {
            background: linear-gradient(135deg, #182385, #2563eb);
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }
        label {
            font-weight: bold;
            color: #1e3a8a;
        }
        input {
            border-radius: 10px !important;
        }
        .btn-success {
            background-color: #16a34a;
            border: none;
            border-radius: 10px;
        }
        .btn-success:hover {
            background-color: #15803d;
        }
        .btn-warning {
            border-radius: 10px;
        }
        table {
            border-radius: 10px;
            overflow: hidden;
        }
        thead {
            background-color: #1e293b;
            color: white;
        }
        tbody tr:hover {
            background-color: #e0f2fe;
            transition: 0.3s;
        }
    </style>
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card shadow-lg">
        <div class="card-header text-white">
            estudiantes 
        </div>
        <div class="card-body">
            <input type="hidden" id="indice">
            <div class="row mb-3">
                <div class="col-md-6">
                    <label>Nombre</label>
                    <input type="text" id="nombre" class="form-control">
                </div>
                <div class="col-md-6">
                    <label>Apellido</label>
                    <input type="text" id="apellido" class="form-control">
                </div>
                <div class="col-md-6">
                    <label>Nie</label>
                    <input type="number" id="nie" class="form-control">
                </div>
                <div class="col-md-6">
                    <label>Fecha</label>
                    <input type="number" id="edad" class="form-control">
                </div>
            </div>
            <div class="mb-3">
                <button class="btn btn-success" onclick="guardar()">Guardar</button>
                <button class="btn btn-warning" onclick="actualizar()">Actualizar</button>
            </div>
            <hr>
            <div class="table-responsive">
                <table class="table table-bordered table-hover text-center">
                    <thead>
                        <tr>
                            <th>Genero</th>
                            <th>Nombre</th>
                            <th>Autor</th>
                            <th>Fecha</th>
                        </tr>
                    </thead>
                    <tbody id="tabla"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
